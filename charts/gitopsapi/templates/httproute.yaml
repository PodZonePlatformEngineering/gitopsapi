{{- if .Values.expose.hostname }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  parentRefs:
    - name: {{ .Values.expose.gatewayName }}
      namespace: {{ .Values.expose.gatewayNamespace }}
      kind: Gateway
  hostnames:
    - {{ .Values.expose.hostname | quote }}
  rules:
    - backendRefs:
        - name: {{ .Release.Name }}
          port: 80
{{- end }}

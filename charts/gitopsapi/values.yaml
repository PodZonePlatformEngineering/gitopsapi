image:
  repository: ghcr.io/motttt/gitopsapi
  tag: "v0.1.6"
  pullPolicy: IfNotPresent

gitops:
  # Read-only catalog repo — required if using the application catalog feature.
  # Set to your own catalog repo URL. No default is provided.
  # Example: "https://github.com/<your-org>/gitopsapi-apps.git"
  catalogRepoUrl: ""
  repoUrl: ""
  branch: main
  githubRepo: ""
  githubOrg: ""
  localPath: /tmp/gitops-repo

secrets:
  githubTokenSecret: gitopsapi-github-token
  mgmtKubeconfigSecret: gitopsapi-mgmt-kubeconfig
  ageKeySecret: gitopsapi-age-key

expose:
  hostname: ""
  gatewayName: gateway
  gatewayNamespace: kube-system
  tlsSecretName: gitopsapi-tls

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

services:
  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Ollama runs on the host (or a separate compose service).
    # Use host.docker.internal:11434 in OLLAMA_BASE_URL for local dev.
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Uncomment to spin up a local Ollama alongside the agent.
  # In CI or on the cluster, Ollama is a shared cluster service.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_models:/root/.ollama
  #
  # volumes:
  #   ollama_models:

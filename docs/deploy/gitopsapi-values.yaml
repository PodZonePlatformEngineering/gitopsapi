image:
  repository: ghcr.io/motttt/gitopsapi
  tag: "v0.1.6"
  pullPolicy: IfNotPresent

gitops:
  repoUrl: "https://github.com/<your-org>/cluster-charts.git"
  branch: main
  githubRepo: "<your-org>/cluster-charts"
  githubOrg: "<your-org>"
  catalogRepoUrl: "https://github.com/<your-org>/gitopsapi-apps.git"

secrets:
  githubTokenSecret: gitopsapi-github-token
  mgmtKubeconfigSecret: gitopsapi-mgmt-kubeconfig
  ageKeySecret: gitopsapi-age-key

expose:
  hostname: gitopsapi.<your-domain>
  tlsSecretName: gitopsapi-tls

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

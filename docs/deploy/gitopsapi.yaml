---
apiVersion: v1
kind: Namespace
metadata:
  name: gitopsapi

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: gitopsapi
  namespace: flux-system
spec:
  interval: 24h
  url: https://podzoneplatformengineering.github.io/gitopsapi

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitopsapi
  namespace: flux-system
spec:
  targetNamespace: gitopsapi
  interval: 30m
  chart:
    spec:
      chart: gitopsapi
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: gitopsapi
        namespace: flux-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: gitopsapi-values
